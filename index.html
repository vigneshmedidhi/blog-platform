<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenScript - Blog & Discussion Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col antialiased">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-40 px-4 lg:px-8 py-4">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2 font-black text-xl text-indigo-600 cursor-pointer tracking-tight"
                onclick="showFeedView()">
                <i class="fa-solid fa-feather-pointed"></i> OpenScript
            </div>

            <div class="flex items-center gap-4">
                <button onclick="openPostModal()"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold px-4 py-2.5 rounded-xl shadow-sm transition flex items-center gap-1.5">
                    <i class="fa-solid fa-plus text-[10px]"></i> Write Article
                </button>

                <div
                    class="flex items-center gap-2 bg-gray-100 p-1 rounded-xl text-xs font-bold border border-gray-200">
                    <span class="text-gray-400 pl-2">As:</span>
                    <select id="user-session-select" onchange="changeUserSession(this.value)"
                        class="bg-white px-2.5 py-1 rounded-lg border-none focus:ring-2 focus:ring-indigo-500 text-gray-700 outline-none">
                        <option value="Alex Rivera">Alex Rivera</option>
                        <option value="Jordan Moss">Jordan Moss</option>
                        <option value="Taylor Page">Taylor Page</option>
                    </select>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1 max-w-3xl w-full mx-auto p-4 md:py-8">

        <section id="view-feed" class="space-y-6">
            <div class="border-b border-gray-200 pb-4">
                <h2 class="text-xl font-bold tracking-tight text-gray-900">Latest Editorial Pieces</h2>
                <p class="text-xs text-gray-500 mt-0.5">Explore stories, viewpoints, and analytical comments across
                    programming and design.</p>
            </div>
            <div id="blog-feed-container" class="space-y-6"></div>
        </section>

        <section id="view-article" class="hidden space-y-6 animate-fade-in">
            <button onclick="showFeedView()"
                class="inline-flex items-center gap-2 text-xs font-semibold text-gray-500 hover:text-indigo-600 transition bg-white border border-gray-200 px-3 py-1.5 rounded-xl">
                <i class="fa-solid fa-arrow-left"></i> Back to feed
            </button>

            <article class="bg-white border border-gray-200 rounded-2xl p-6 md:p-8 space-y-4 shadow-sm">
                <div class="flex items-center gap-3 text-xs">
                    <span id="detail-author"
                        class="font-bold text-indigo-600 bg-indigo-50 border border-indigo-100 px-2.5 py-0.5 rounded-md">Author
                        Name</span>
                    <span id="detail-date" class="text-gray-400">Date Posted</span>
                </div>
                <h1 id="detail-title"
                    class="text-2xl md:text-3xl font-extrabold text-gray-900 tracking-tight leading-tight"></h1>
                <p id="detail-content"
                    class="text-gray-600 text-sm md:text-base leading-relaxed whitespace-pre-wrap pt-2"></p>
            </article>

            <div class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm space-y-6">
                <h3 class="font-bold text-gray-900 text-base flex items-center gap-2">
                    <i class="fa-regular fa-comments text-gray-400"></i> Discussion Board
                    <span id="detail-comment-count"
                        class="bg-gray-100 text-gray-600 text-xs font-black px-2 py-0.5 rounded-full">0</span>
                </h3>

                <form id="comment-form" class="space-y-3">
                    <textarea id="comment-input" rows="3" required
                        placeholder="Join the discussion, share constructive insights..."
                        class="w-full text-sm p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition resize-none"></textarea>
                    <div class="flex justify-end">
                        <button type="submit"
                            class="bg-gray-900 hover:bg-gray-800 text-white text-xs font-semibold px-4 py-2 rounded-xl transition">
                            Post Comment
                        </button>
                    </div>
                </form>

                <div id="comments-stack" class="divide-y divide-gray-100 pt-2"></div>
            </div>
        </section>

    </main>

    <div id="post-modal"
        class="hidden fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-2xl shadow-xl overflow-hidden transform scale-95 transition">
            <div class="px-6 py-4 bg-gray-50 border-b border-gray-100 flex justify-between items-center">
                <h3 id="modal-heading" class="font-bold text-gray-900">Compose Article</h3>
                <button onclick="closePostModal()" class="text-gray-400 hover:text-gray-600"><i
                        class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <form id="post-form" class="p-6 space-y-4">
                <input type="hidden" id="post-id">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1.5">Article
                        Title</label>
                    <input type="text" id="post-title" required placeholder="Catchy, meaningful context headline"
                        class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-sm font-medium">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1.5">Body
                        Manuscript</label>
                    <textarea id="post-content" rows="8" required
                        placeholder="Write your narrative perspectives or instructional tech material here..."
                        class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-sm resize-none leading-relaxed"></textarea>
                </div>
                <div class="flex gap-3 pt-4 border-t border-gray-100">
                    <button type="button" onclick="closePostModal()"
                        class="flex-1 py-2.5 border border-gray-200 hover:bg-gray-50 text-gray-600 text-sm font-medium rounded-xl transition">Discard</button>
                    <button type="submit"
                        class="flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-xl transition shadow-sm">Publish
                        Article</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- DATA DEPOSIT LAYER (LocalStorage DB Schema Configuration) ---
        const BlogDB = {
            init() {
                if (!localStorage.getItem('blog_posts')) {
                    const seedPosts = [
                        { id: 'p1', title: 'Navigating the Evolution of Modern State Management', author: 'Alex Rivera', content: 'State sync implementations shouldn’t resemble tangled wiring. As frontend engines move toward refined localized systems, finding the balance between global stores and reactive components is critical to reducing processing footprint over modern runtime spaces.', date: 'June 01, 2026' },
                        { id: 'p2', title: 'Why Clean API Handlers Transform Team Speeds', author: 'Jordan Moss', content: 'Explicit contracts change everything. When backend architectures output completely typed abstractions, client code developers avoid building brittle interpretation scripts, enabling rapid feature rollouts without regressions.', date: 'June 11, 2026' }
                    ];
                    localStorage.setItem('blog_posts', JSON.stringify(seedPosts));
                }
                if (!localStorage.getItem('blog_comments')) {
                    const seedComments = [
                        { id: 'c1', postId: 'p1', author: 'Jordan Moss', content: 'Completely agree. Over-engineering global context engines early in production cycle kills productivity.', date: 'June 02, 2026' },
                        { id: 'c2', postId: 'p1', author: 'Taylor Page', content: 'Great insights here! Any thoughts on combining signals with hook pipelines?', date: 'June 03, 2026' }
                    ];
                    localStorage.setItem('blog_comments', JSON.stringify(seedComments));
                }
            },
            getPosts() { return JSON.parse(localStorage.getItem('blog_posts')); },
            savePosts(data) { localStorage.setItem('blog_posts', JSON.stringify(data)); },
            getComments() { return JSON.parse(localStorage.getItem('blog_comments')); },
            saveComments(data) { localStorage.setItem('blog_comments', JSON.stringify(data)); }
        };

        // --- GLOBAL RUNTIME CONFIGURATION STATES ---
        let currentAuthUser = 'Alex Rivera';
        let activeReadingPostId = null;
        BlogDB.init();

        // --- QUERY ELEMENT INTERFACES ---
        const feedContainer = document.getElementById('blog-feed-container');
        const viewFeed = document.getElementById('view-feed');
        const viewArticle = document.getElementById('view-article');
        const postModal = document.getElementById('post-modal');
        const postForm = document.getElementById('post-form');
        const commentForm = document.getElementById('comment-form');
        const commentsStack = document.getElementById('comments-stack');

        // --- SYSTEM AUTH RE-ROUTING ACTION ---
        function changeUserSession(username) {
            currentAuthUser = username;
            renderFeed();
            if (activeReadingPostId) renderArticleView(activeReadingPostId);
        }

        // --- ROUTING ENGINE VIEW SWAPPER ---
        function showFeedView() {
            activeReadingPostId = null;
            viewArticle.classList.add('hidden');
            viewFeed.classList.remove('hidden');
            renderFeed();
        }

        // --- DISPLAY 1: CORE ARTICLE INDEX FEED ---
        function renderFeed() {
            const posts = BlogDB.getPosts();
            const comments = BlogDB.getComments();
            feedContainer.innerHTML = '';

            posts.forEach(post => {
                const count = comments.filter(c => c.postId === post.id).length;
                const card = document.createElement('div');
                card.className = "bg-white border border-gray-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition flex flex-col justify-between relative group";

                // Expose operational actions explicitly if current authorization session matches Author value
                const controlButtons = post.author === currentAuthUser
                    ? `<div class="absolute top-5 right-5 flex gap-1.5 opacity-80 group-hover:opacity-100 transition">
                        <button onclick="event.stopPropagation(); openPostModal('${post.id}')" class="p-1.5 border border-amber-200 hover:bg-amber-50 text-amber-600 rounded-lg transition" title="Modify Post"><i class="fa-solid fa-pen text-xs"></i></button>
                        <button onclick="event.stopPropagation(); deletePost('${post.id}')" class="p-1.5 border border-rose-200 hover:bg-rose-50 text-rose-600 rounded-lg transition" title="Delete Post"><i class="fa-solid fa-trash text-xs"></i></button>
                       </div>`
                    : '';

                card.innerHTML = `
                    ${controlButtons}
                    <div class="cursor-pointer space-y-2 pr-16" onclick="renderArticleView('${post.id}')">
                        <div class="flex items-center gap-2 text-xs">
                            <span class="font-bold text-gray-900">${escapeHTML(post.author)}</span>
                            <span class="text-gray-400">•</span>
                            <span class="text-gray-400">${post.date}</span>
                        </div>
                        <h3 class="font-bold text-gray-950 text-lg group-hover:text-indigo-600 transition tracking-tight break-words">${escapeHTML(post.title)}</h3>
                        <p class="text-gray-500 text-xs md:text-sm line-clamp-3 break-words leading-relaxed">${escapeHTML(post.content)}</p>
                        <div class="pt-3 text-xs font-bold text-gray-400 flex items-center gap-1.5">
                            <i class="fa-regular fa-comment text-sm"></i> ${count} interaction${count === 1 ? '' : 's'}
                        </div>
                    </div>
                `;
                feedContainer.appendChild(card);
            });
        }

        // --- DISPLAY 2: DETAIL SINGLE ARTICLE & DISCUSSION TREE ---
        function renderArticleView(id) {
            activeReadingPostId = id;
            const post = BlogDB.getPosts().find(p => p.id === id);
            if (!post) { showFeedView(); return; }

            viewFeed.classList.add('hidden');
            viewArticle.classList.remove('hidden');

            document.getElementById('detail-title').textContent = post.title;
            document.getElementById('detail-author').textContent = post.author;
            document.getElementById('detail-date').textContent = post.date;
            document.getElementById('detail-content').textContent = post.content;

            renderComments(id);
        }

        function renderComments(postId) {
            const comments = BlogDB.getComments().filter(c => c.postId === postId);
            document.getElementById('detail-comment-count').textContent = comments.length;
            commentsStack.innerHTML = '';

            if (comments.length === 0) {
                commentsStack.innerHTML = `<p class="text-gray-400 text-xs text-center py-6">No discussions logged on this article yet. Be the first to add yours below!</p>`;
                return;
            }

            comments.forEach(c => {
                const commentBox = document.createElement('div');
                commentBox.className = "py-4 text-sm space-y-1 relative group";

                const deleteAction = c.author === currentAuthUser
                    ? `<button onclick="deleteComment('${c.id}')" class="absolute right-2 top-4 opacity-0 group-hover:opacity-100 text-gray-400 hover:text-rose-500 transition px-1.5 py-1 text-xs" title="Remove comment"><i class="fa-solid fa-trash-can"></i></button>`
                    : '';

                commentBox.innerHTML = `
                    ${deleteAction}
                    <div class="flex items-center gap-2 text-xs">
                        <span class="font-bold text-gray-900">${escapeHTML(c.author)}</span>
                        <span class="text-gray-400">${c.date}</span>
                    </div>
                    <p class="text-gray-600 text-xs md:text-sm break-words leading-relaxed">${escapeHTML(c.content)}</p>
                `;
                commentsStack.appendChild(commentBox);
            });
        }

        // --- ARTICLE MUTATION ENGINES (CRUD LOGIC) ---
        postForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('post-id').value;
            const title = document.getElementById('post-title').value;
            const content = document.getElementById('post-content').value;

            let posts = BlogDB.getPosts();

            if (id) {
                // Update mutation
                posts = posts.map(p => p.id === id ? { ...p, title, content } : p);
            } else {
                // Create mutation
                const newPost = {
                    id: 'POST-' + Date.now().toString(),
                    title,
                    content,
                    author: currentAuthUser,
                    date: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
                };
                posts.unshift(newPost);
            }

            BlogDB.savePosts(posts);
            closePostModal();
            renderFeed();
        });

        window.deletePost = function (id) {
            if (confirm("Are you certain you want to delete this piece? Associated comments will be permanently erased.")) {
                const filteredPosts = BlogDB.getPosts().filter(p => p.id !== id);
                const filteredComments = BlogDB.getComments().filter(c => c.postId !== id);

                BlogDB.savePosts(filteredPosts);
                BlogDB.saveComments(filteredComments);
                renderFeed();
            }
        };

        // --- COMMENTS CREATION & REMOVAL OPERATIONS ---
        commentForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const inputField = document.getElementById('comment-input');
            const comments = BlogDB.getComments();

            const newComment = {
                id: 'COM-' + Date.now().toString(),
                postId: activeReadingPostId,
                author: currentAuthUser,
                content: inputField.value,
                date: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
            };

            comments.push(newComment);
            BlogDB.saveComments(comments);
            inputField.value = '';
            renderComments(activeReadingPostId);
        });

        window.deleteComment = function (id) {
            const filteredComments = BlogDB.getComments().filter(c => c.id !== id);
            BlogDB.saveComments(filteredComments);
            renderComments(activeReadingPostId);
        };

        // --- WINDOW FORMS UTILITIES CONTROLLER ---
        window.openPostModal = function (id = null) {
            postModal.classList.remove('hidden');
            if (id) {
                document.getElementById('modal-heading').textContent = "Modify Article Blueprint";
                const targetPost = BlogDB.getPosts().find(p => p.id === id);
                document.getElementById('post-id').value = targetPost.id;
                document.getElementById('post-title').value = targetPost.title;
                document.getElementById('post-content').value = targetPost.content;
            } else {
                document.getElementById('modal-heading').textContent = "Draft Modern Article";
                postForm.reset();
                document.getElementById('post-id').value = '';
            }
        };

        window.closePostModal = function () { postModal.classList.add('hidden'); };

        // --- INJECTION PREVENTATIVE ESCAPING UTILITY ---
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        // Initialize Initial View Setup
        renderFeed();
    </script>
</body>

</html>
